<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="layout/frontEnd :: head(~{::title}, ~{::links})"></head>
    <body>
        <header th:replace="layout/frontEnd :: header"></header>
        <main class="container-fluid">
            <div id="registrar">
                <form th:action="@{/admin/editarProducto}" th:object="${producto}" class="row g-3" method="POST" enctype="multipart/form-data" >
                    <div class="col-md-6" >
                        <label for="id" class="form-label">Id:</label>
                        <input type="text" name="id" th:value="${producto.id}"  class="form-control" id="inputName" >

                    </div>
                    <div class="col-md-6">
                        <label for="inputName" class="form-label">Nombre:</label>
                        <input type="text" th:value="${producto.nombre}" name="nombre" class="form-control" id="inputName">
                            <div class="alert alert-danger" th:if="${errors != null && errors.containsKey('nombre')}" th:text="${errors.nombre}"></div>
                    </div>
                    <div class="col-md-6">
                        <label for="inputEmail4" class="form-label">Stock:</label>
                        <input type="text" th:value="${producto.stock}" name="correo"  class="form-control" id="inputEmail4">
                            <div class="alert alert-danger" th:if="${errors != null && errors.containsKey('stock')}" th:text="${errors.stock}"></div>
                    </div>
                    <div class="col-12">
                        <label for="inputName" class="form-label">Categoria:</label>
                        <input type="text" th:value="${producto.categoria}" name="contacto"  class="form-control" id="inputName" >
                            <div class="alert alert-danger" th:if="${errors != null && errors.containsKey('categoria')}" th:text="${errors.categoria}"></div>
                    </div>
                    <div class="col-12">
                        <label for="inputName" class="form-label">Talla:</label>
                        <input type="text" th:value="${producto.talla}" name="tipoDoc"  class="form-control" id="inputName" >
                            <div class="alert alert-danger" th:if="${errors != null && errors.containsKey('talla')}" th:text="${errors.talla}"></div>
                    </div>
                    <div class="col-12">
                        <label for="inputName" class="form-label">Color:</label>
                        <input type="text" th:value="${producto.color}"  name="doc"  class="form-control" id="inputName" >
                            <div class="alert alert-danger" th:if="${errors != null && errors.containsKey('color')}" th:text="${errors.color}"></div>
                    </div>
                    <div class="col-12">
                        <label for="inputName" class="form-label">Marca:</label>
                        <input type="text" th:value="${producto.marca}" name="fechaExpedicion"   class="form-control" id="inputName" >
                            <div class="alert alert-danger" th:if="${errors != null && errors.containsKey('marca')}" th:text="${errors.marca}"></div>
                    </div>
                    <div class="col-md-2">
                        <label for="inputName" class="form-label">Rating:</label>
                        <input type="number" name="rating" th:field="*{rating}" class="form-control" id="inputName">
                            <div class="alert alert-danger" th:if="${errors != null && errors.containsKey('fechaNacimiento')}" th:text="${errors.fechaNacimiento}"></div>
                    </div>

                    <div class="col-md-2">
                        <label for="inputZip" class="form-label">Archivos:</label>
                        <input type="file" name="archivos[]" class="form-control" id="inputZip" multiple>
                            <div class="alert alert-danger" th:if="${errors != null && errors.containsKey('archivos')}" th:text="${errors.archivos}"></div>
                    </div>
                    <div class="col-md-2">
                        <label for="inputName" class="form-label">Precio</label>
                        <input type="number" name="precio" th:field="${producto.precio}" class="form-control" id="inputName">
                            <div class="alert alert-danger" th:if="${errors != null && errors.containsKey('precio')}" th:text="${errors.precio}"></div>
                    </div>
                  

                    <div class="col-12">
                        <button type="submit" onclick="editarProducto(this)" class="btn btn-primary">Editar</button>
                        <a  th:href="@{/listaProducto}" class="btn btn-danger">Regresar</a>
                    </div>
                    <div th:if="${mensaje != null}" 
                         th:class="'alert alert-' + ${clase} + ' alert-dismissable fade show'">
                        <span th:text="${mensaje}"></span> 
                        <button th:if="${mensaje != null}" type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                </form>
            </div>












            <footer th:replace="layout/frontEnd :: footer"></footer>

            <div th:replace="layout/frontEnd :: scripts"></div>
             <script th:inline="javascript">
        const token = document.querySelector('meta[name="_csrf"]').content;
        const header = document.querySelector('meta[name="_csrf_header"]').content;
        
        
        function editarProducto(element){
            let form = element.closest("form");
       
            var formData = new FormData(form);
     
                
          
            fetch('/admin/editarProducto', {
              method: 'POST',
              body: formData  
            }).then(response => response.json())
              .then(data =>{
                if(data.clase === 'error'){
                    Swal.fire({
                    icon: "error",
                    title: "Error",
                    text: data.mensaje
                });
               
             
                }else if(data.clase === 'warning'){
                    Swal.fire({
                        icon: "warning",
                        title: "Advertencia",
                        text: data.mensaje
                    }).then(() =>{
                        location.reload();
                    });
                   
                }else if(data.clase === 'success'){
                    Swal.fire({
                        icon: "success",
                        title: "Exito",
                        text: data.mensaje
                    }).then(() =>{
                        location.reload();
                    });
                }
                
            }).catch(error =>{
                Swal.fire({
                    icon: "error",
                    title: "Error inesperado",
                    mensaje: "Error de respuesta en el servidor"
                });
            });
            
            
            
            
            
        }
        
        
    

    </script>
        </main>
    </body>
</html>
